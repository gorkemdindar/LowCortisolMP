<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background dark -->
  <rect width="32" height="32" fill="#0a0a0f"/>

  <!-- Creeper face base (dark green) -->
  <rect x="4" y="4" width="24" height="24" fill="#14532d"/>

  <!-- Scanline overlay strips for cyberpunk feel -->
  <rect x="4" y="5" width="24" height="1" fill="#0a0a0f" opacity="0.3"/>
  <rect x="4" y="8" width="24" height="1" fill="#0a0a0f" opacity="0.3"/>
  <rect x="4" y="11" width="24" height="1" fill="#0a0a0f" opacity="0.3"/>
  <rect x="4" y="14" width="24" height="1" fill="#0a0a0f" opacity="0.3"/>
  <rect x="4" y="17" width="24" height="1" fill="#0a0a0f" opacity="0.3"/>
  <rect x="4" y="20" width="24" height="1" fill="#0a0a0f" opacity="0.3"/>
  <rect x="4" y="23" width="24" height="1" fill="#0a0a0f" opacity="0.3"/>

  <!-- Left eye -->
  <rect x="7" y="9" width="5" height="5" fill="#4ade80"/>
  <!-- Left eye inner glow -->
  <rect x="8" y="10" width="3" height="3" fill="#86efac"/>

  <!-- Right eye -->
  <rect x="20" y="9" width="5" height="5" fill="#4ade80"/>
  <!-- Right eye inner glow -->
  <rect x="21" y="10" width="3" height="3" fill="#86efac"/>

  <!-- Mouth - creeper style -->
  <rect x="13" y="16" width="6" height="2" fill="#0a0a0f"/>
  <rect x="11" y="18" width="3" height="4" fill="#0a0a0f"/>
  <rect x="18" y="18" width="3" height="4" fill="#0a0a0f"/>
  <rect x="13" y="20" width="6" height="2" fill="#0a0a0f"/>

  <!-- Neon edge glow top/bottom -->
  <rect x="4" y="4" width="24" height="1" fill="#4ade80"/>
  <rect x="4" y="27" width="24" height="1" fill="#4ade80"/>
  <rect x="4" y="4" width="1" height="24" fill="#4ade80"/>
  <rect x="27" y="4" width="1" height="24" fill="#4ade80"/>

  <!-- Corner pixels for cyberpunk frame -->
  <rect x="0" y="0" width="4" height="4" fill="#4ade80" opacity="0.4"/>
  <rect x="28" y="0" width="4" height="4" fill="#4ade80" opacity="0.4"/>
  <rect x="0" y="28" width="4" height="4" fill="#4ade80" opacity="0.4"/>
  <rect x="28" y="28" width="4" height="4" fill="#4ade80" opacity="0.4"/>
</svg>
